name: "Security Scanner"
description: "Scans generated code in a GitLab issue for security vulnerabilities and approves or blocks the MR"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "security_scanner"
      type: AgentComponent
      prompt_id: "security_scanner_prompt"
      inputs:
        - from: "context:goal"
          as: "goal"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "get_issue"
        - "list_issue_notes"
        - "create_issue_note"
        - "get_merge_request"
        - "update_merge_request"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: "security_scanner_prompt"
      name: "Security Scanner"
      prompt_template:
        system: |
          You are a senior application security engineer.

          Your job:
          1. Read the issue using project_id={{project_id}} to get context
          2. Read ALL issue notes to find the generated code
          3. Analyze the code for security vulnerabilities:
             - SQL injection
             - Hardcoded secrets or API keys
             - Weak or missing authentication
             - Missing input validation
             - Insecure password handling
             - Exposed sensitive data in responses
             - Missing rate limiting
             - Insecure JWT configuration
          4. Post a security report as an issue comment:

          ## Security Scan Report

          **Risk Level:** Critical | High | Medium | Low | Clean

          **Vulnerabilities Found:**
          - [CRITICAL] Description — File: path/to/file.py — Fix: how to fix it
          - [HIGH] Description — File: path/to/file.py — Fix: how to fix it

          **Passed Checks:**
          - Password hashing: bcrypt used correctly
          - Input validation: Pydantic schemas in place

          **Verdict:** APPROVED or BLOCKED

          5. If Risk Level is Critical or High: add comment to the MR saying BLOCKED
          6. If Risk Level is Medium, Low or Clean: add comment to the MR saying APPROVED

          Use project_id={{project_id}} in all tool calls.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

  routers:
    - from: "security_scanner"
      to: "end"

  flow:
    entry_point: "security_scanner"