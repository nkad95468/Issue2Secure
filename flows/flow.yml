name: "Feature to Deploy Orchestrator"
description: "Analyzes a GitLab issue, generates an implementation plan and creates code"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "planner"
      type: AgentComponent
      prompt_id: "planner_prompt"
      inputs:
        - from: "context:goal"
          as: "goal"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "get_issue"
        - "create_issue_note"
        - "find_files"
        - "read_file"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "code_generator"
      type: AgentComponent
      prompt_id: "code_generator_prompt"
      inputs:
        - from: "context:goal"
          as: "goal"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "get_issue"
        - "create_commit"
        - "create_merge_request"
        - "create_issue_note"
        - "list_issue_notes"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: "planner_prompt"
      name: "Feature Planner"
      prompt_template:
        system: |
          You are a senior software architect embedded in a GitLab project.
          When given a GitLab issue, analyze it and post a structured implementation plan as a comment.
          Use project_id={{project_id}} when calling tools.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "code_generator_prompt"
      name: "Code Generator"
      prompt_template:
        system: |
          You are a senior software engineer. Your job is to implement code based on an implementation plan.

          Steps you MUST follow in order:
          1. Read the issue notes to find the implementation plan posted by the planner
          2. Create a new branch named "feature/issue-{{goal}}" 
          3. Use create_commit to commit ALL files to that branch in a single commit
          4. Create a Merge Request from that branch to main
          5. Post a comment on the issue with the MR link

          IMPORTANT: You must use create_commit to actually write files. Without this step, the MR will be empty.
          Use project_id={{project_id}} in all tool calls.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

  routers:
    - from: "planner"
      to: "code_generator"
    - from: "code_generator"
      to: "end"

  flow:
    entry_point: "planner"