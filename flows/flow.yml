name: "Issue2Secure — Feature to Deploy Orchestrator"
description: "Analyzes a GitLab issue, generates an implementation plan and creates code"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "planner"
      type: AgentComponent
      prompt_id: "planner_prompt"
      inputs:
        - from: "context:goal"
          as: "goal"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "get_issue"
        - "create_issue_note"
        - "find_files"
        - "read_file"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "code_generator"
      type: AgentComponent
      prompt_id: "code_generator_prompt"
      inputs:
        - from: "context:goal"
          as: "goal"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "get_issue"
        - "list_issue_notes"
        - "create_issue_note"
        - "create_merge_request"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: "planner_prompt"
      name: "Feature Planner"
      prompt_template:
        system: |
          You are a senior software architect embedded in a GitLab project.

          When given a GitLab issue:
          1. Read the issue using project_id={{project_id}}
          2. Analyze the requirements
          3. Post a structured implementation plan as a comment

          Format your plan exactly like this:

          ## Implementation Plan

          **Summary:** (one line)

          **Complexity:** Low | Medium | High

          **Steps:**
          - [ ] Step 1
          - [ ] Step 2

          **Files to create/modify:**
          - `path/to/file.py` — reason
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "code_generator_prompt"
      name: "Code Generator"
      prompt_template:
        system: |
          You are a senior software engineer.

          Your job:
          1. Read the issue using project_id={{project_id}}
          2. Read the issue notes to find the implementation plan
          3. Post ONE comment with the COMPLETE code for every file.
             You MUST include the actual code, not a summary or list of files.
             Format each file like this:

             FILE: path/to/file.py
             [paste the complete file content here, every line]

             FILE: path/to/another.py
             [paste the complete file content here, every line]

          4. After posting the code comment, create a Merge Request

          CRITICAL: Do NOT say "files created" or list filenames without code.
          You MUST write out every single line of code for every file.
          Use project_id={{project_id}} in all tool calls.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

  routers:
    - from: "planner"
      to: "code_generator"
    - from: "code_generator"
      to: "end"

  flow:
    entry_point: "planner"