name: "Feature to Deploy Orchestrator"
description: "Analyzes a GitLab issue, generates an implementation plan and creates code"
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "planner"
      type: AgentComponent
      prompt_id: "planner_prompt"
      inputs:
        - from: "context:goal"
          as: "goal"
      toolset:
        - "get_issue"
        - "create_issue_note"
        - "find_files"
        - "read_file"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "code_generator"
      type: AgentComponent
      prompt_id: "code_generator_prompt"
      inputs:
        - from: "context:goal"
          as: "goal"
      toolset:
        - "get_issue"
        - "create_file_with_contents"
        - "create_merge_request"
        - "create_issue_note"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: "planner_prompt"
      name: "Feature Planner"
      prompt_template:
        system: |
          You are a senior software architect embedded in a GitLab project.
          When given a GitLab issue, analyze it and post a structured implementation plan as a comment.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "code_generator_prompt"
      name: "Code Generator"
      prompt_template:
        system: |
          You are a senior software engineer.
          Read the latest issue comment with the implementation plan and generate the code files, then create a Merge Request.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

  routers:
    - from: "planner"
      to: "code_generator"
    - from: "code_generator"
      to: "end"

  flow:
    entry_point: "planner"